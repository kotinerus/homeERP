<div class="flex h-full flex-col">
  <p-table
    #dataTable
    dataKey="id"
    [loading]="loading"
    [value]="products"
    [scrollable]="true"
    [rows]="rows"
    [paginator]="true"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [showCurrentPageReport]="true"
    [globalFilterFields]="['name', 'category']"
    [first]="first"
    [tableStyle]="{ 'min-width': '50rem' }"
    (onPage)="pageChange($event)"
    scrollHeight="flex"
    currentPageReportTemplate="Rekordy od {first} do {last} z {totalRecords}"
    stripedRows
    class="flex flex-1 flex-col overflow-hidden [&_.p-paginator]:justify-end!"
  >
    <ng-template #caption>
      <div class="flex flex-row items-end">
        <p-button [raised]="true" icon="ph ph-plus" severity="secondary" class="ml-auto" />

        <p-iconfield iconPosition="left" class="ml-2">
          <p-inputicon>
            <i class="ph ph-magnifying-glass"></i>
          </p-inputicon>
          <input
            pInputText
            type="text"
            (input)="dataTable.filterGlobal($event.target.value, 'contains')"
            placeholder="Search keyword"
          />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Inventory status</th>
        <th>Quantity on stock</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-product>
      <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>
          <p-cellEditor>
            <ng-template #input>
              <p-select
                [options]="statuses"
                appendTo="body"
                [(ngModel)]="product.inventoryStatus"
                [style]="{ width: '100%' }"
              />
            </ng-template>
            <ng-template #output>
              <p-tag
                [value]="product.inventoryStatus"
                [severity]="getSeverity(product.inventoryStatus)"
              />
            </ng-template>
          </p-cellEditor>
        </td>
        <td>{{ product.quantity }} {{ getUnitShortName(product) | translate }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
